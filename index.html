        var dayType = (day === 0) ? "일요일" : (day === 6 ? "토요일" : "평일");

        pools.forEach(function(p) {

            var nextMsg = "오늘 정비 종료";

                var s = time[0].split(':');
                var e = time[1].split(':');

                    isCleaning = true;
                    color = "red";
                    statusTxt = "입장 불가 (정비 중)";
